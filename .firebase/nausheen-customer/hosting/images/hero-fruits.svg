<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" fill="none" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Fresh fruit juices and smoothies</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7ed"/>
      <stop offset="0.5" stop-color="#ffedd5"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="juice" x1="400" y1="120" x2="400" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="glass" x1="280" y1="80" x2="520" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff7ed" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="640" rx="48" fill="url(#bg)"/>
  <ellipse cx="620" cy="520" rx="200" ry="80" fill="#fdba74" opacity="0.35"/>
  <ellipse cx="180" cy="480" rx="160" ry="60" fill="#fb923c" opacity="0.25"/>
  <!-- Glass -->
  <path
    d="M320 100 L480 100 L440 520 L360 520 Z"
    fill="url(#glass)"
    stroke="#fed7aa"
    stroke-width="3"
  />
  <path d="M330 130 L470 130 L435 480 L365 480 Z" fill="url(#juice)" opacity="0.92"/>
  <ellipse cx="400" cy="130" rx="78" ry="14" fill="#fff" opacity="0.9"/>
  <!-- Straw -->
  <path d="M420 40 L440 40 L430 200 L410 200 Z" fill="#22c55e" opacity="0.9"/>
  <path d="M418 42 L438 42 L432 120 L424 120 Z" fill="#4ade80"/>
  <!-- Orange slice -->
  <g filter="url(#soft)" transform="translate(520 180) rotate(15)">
    <circle r="90" fill="#f97316"/>
    <circle r="78" fill="#ffedd5"/>
    <path d="M0-78 L0 78 M-67-39 L67 39 M-67 39 L67-39" stroke="#fdba74" stroke-width="4"/>
  </g>
  <!-- Strawberry -->
  <g transform="translate(140 200)">
    <path d="M0 0 C-40 60 -30 120 0 140 C30 120 40 60 0 0" fill="#dc2626"/>
    <ellipse cx="0" cy="-8" rx="28" ry="18" fill="#16a34a"/>
  </g>
  <!-- Kiwi -->
  <g transform="translate(640 320)">
    <circle r="55" fill="#84cc16"/>
    <circle r="48" fill="#ecfccb"/>
    <circle r="8" fill="#4d7c0f" opacity="0.4"/>
  </g>
  <!-- Bubbles -->
  <circle cx="380" cy="220" r="6" fill="#fff" opacity="0.5"/>
  <circle cx="410" cy="280" r="4" fill="#fff" opacity="0.45"/>
  <circle cx="395" cy="350" r="5" fill="#fff" opacity="0.4"/>
</svg>
