<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nausheen Staff Desktop</title>
    <script>
      (function(){try{var k="nausheen_theme_preference";var p=localStorage.getItem(k);var r=p==="light"||p==="dark"?p:(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");var d=document.documentElement;d.classList.toggle("dark",r==="dark");d.style.colorScheme=r;d.dataset.theme=r;}catch(e){}})();
    </script>
  </head>
  <body class="antialiased bg-theme-background text-theme-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
